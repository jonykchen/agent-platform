# buf.gen.yaml - Proto 多语言代码生成配置
# 使用 buf 远程插件，无需本地安装 protoc-gen-*

version: v2

plugins:
  # Java Protobuf
  - remote: buf.build/protocolbuffers/java
    out: services/gateway-java/src/main/java/gen
  - remote: buf.build/grpc/java
    out: services/gateway-java/src/main/java/gen

  - remote: buf.build/protocolbuffers/java
    out: services/tool-bus-java/src/main/java/gen
  - remote: buf.build/grpc/java
    out: services/tool-bus-java/src/main/java/gen

  - remote: buf.build/protocolbuffers/java
    out: services/governance-java/src/main/java/gen
  - remote: buf.build/grpc/java
    out: services/governance-java/src/main/java/gen

  # Python Protobuf
  - remote: buf.build/protocolbuffers/python
    out: services/orchestrator-python/app/gen
  - remote: buf.build/grpc/python
    out: services/orchestrator-python/app/gen

  - remote: buf.build/protocolbuffers/python
    out: services/model-gateway-python/app/gen
  - remote: buf.build/grpc/python
    out: services/model-gateway-python/app/gen

  - remote: buf.build/protocolbuffers/python
    out: services/knowledge-python/app/gen
  - remote: buf.build/grpc/python
    out: services/knowledge-python/app/gen
