# buf.gen.yaml - Proto 多语言代码生成配置
# https://buf.build/docs/configuration/v1/buf-gen-yaml

version: v1

managed:
  enabled: true
  override:
    - file_option: java_multiple_files
      value: true
    - file_option: java_package_prefix
      value: com.platform

plugins:
  # Java gRPC + Protobuf
  - name: java
    out: services/gateway-java/src/main/java/gen
    opt:
      - source_relative
  - name: grpc-java
    out: services/gateway-java/src/main/java/gen
    opt:
      - source_relative
  - name: java
    out: services/tool-bus-java/src/main/java/gen
    opt:
      - source_relative
  - name: grpc-java
    out: services/tool-bus-java/src/main/java/gen
    opt:
      - source_relative
  - name: java
    out: services/governance-java/src/main/java/gen
    opt:
      - source_relative
  - name: grpc-java
    out: services/governance-java/src/main/java/gen
    opt:
      - source_relative

  # Python gRPC + Protobuf
  - name: python
    out: services/orchestrator-python/app/gen
    opt:
      - source_relative
  - name: pyi
    out: services/orchestrator-python/app/gen
    opt:
      - source_relative
  - name: grpc-python
    out: services/orchestrator-python/app/gen
    opt:
      - source_relative

  - name: python
    out: services/model-gateway-python/app/gen
    opt:
      - source_relative
  - name: pyi
    out: services/model-gateway-python/app/gen
    opt:
      - source_relative
  - name: grpc-python
    out: services/model-gateway-python/app/gen
    opt:
      - source_relative

  - name: python
    out: services/knowledge-python/app/gen
    opt:
      - source_relative
  - name: pyi
    out: services/knowledge-python/app/gen
    opt:
      - source_relative
  - name: grpc-python
    out: services/knowledge-python/app/gen
    opt:
      - source_relative

  # OpenAPI (用于 REST 接口文档)
  - name: openapiv2
    out: contracts/openapi/gen
    opt:
      - output_mode=default
