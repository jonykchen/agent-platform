# ============================================================
#  Alertmanager Configuration
# ============================================================

global:
  resolve_timeout: 5m
  # SMTP 配置（可选）
  smtp_smarthost: '${SMTP_HOST}:${SMTP_PORT}'
  smtp_from: '${SMTP_FROM}'
  smtp_auth_username: '${SMTP_USERNAME}'
  smtp_auth_password: '${SMTP_PASSWORD}'

# 告警路由
route:
  group_by: ['alertname', 'severity']
  group_wait: 30s      # 等待 30 秒收集同组告警
  group_interval: 5m   # 每 5 分钟发送一次
  repeat_interval: 4h  # 重复告警间隔 4 小时
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
      continue: true
    - match:
        severity: warning
      receiver: 'warning-alerts'

# 接收器配置
receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://governance-java:8082/api/v1/alerts/webhook'
        send_resolved: true

  - name: 'critical-alerts'
    # 钉钉 webhook（需配置）
    webhook_configs:
      - url: '${DINGTALK_WEBHOOK_URL}'
        send_resolved: true
    # 企业微信 webhook（需配置）
    webhook_configs:
      - url: '${WECOM_WEBHOOK_URL}'
        send_resolved: true

  - name: 'warning-alerts'
    webhook_configs:
      - url: 'http://governance-java:8082/api/v1/alerts/webhook'
        send_resolved: true

# 抑制规则
inhibit_rules:
  # 服务宕机时，抑制该服务的其他告警
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: '.*'
    equal: ['job', 'instance']