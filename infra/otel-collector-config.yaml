# ============================================================
#  OpenTelemetry Collector 配置
# ============================================================

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  prometheus:
    endpoint: 0.0.0.0:8888
    namespace: agent_platform

  # 分布式追踪导出到 Jaeger（OTLP gRPC）
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # 日志导出到 Loki（OTLP HTTP）。与 Promtail 采集互补：
  # 应用主动上报走此路径，容器 stdout 由 Promtail 采集。
  otlphttp/loki:
    endpoint: http://loki:3100/otlp

  logging:
    loglevel: info

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger, logging]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, logging]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/loki, logging]
