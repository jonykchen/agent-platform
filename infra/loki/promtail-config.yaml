# ============================================================
#  Promtail 配置 - 采集 Docker 容器日志推送至 Loki
# ============================================================
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # 采集本机所有 Docker 容器的 stdout/stderr 日志
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # 容器名作为 label，便于在 Grafana 按服务过滤
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
    pipeline_stages:
      # 平台服务输出 JSON 结构化日志，提取关键字段为 label
      - json:
          expressions:
            level: level
            service: service
            request_id: request_id
            tenant_id: tenant_id
      - labels:
          level:
          service:
