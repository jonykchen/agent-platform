# ============================================================
#  Agent Platform - 部署配置（使用预构建镜像）
# ============================================================

services:
  # PostgreSQL 16 + pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agent-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-agent_platform}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../shared/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app_user} -d ${POSTGRES_DB:-agent_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    networks:
      - agent-network

  # Redis 7
  redis:
    image: redis:7-alpine
    container_name: agent-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
    networks:
      - agent-network

  # Gateway
  gateway:
    image: ghcr.io/jonykchen/agent-platform/gateway:latest
    container_name: agent-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-agent_platform}
      DB_USER: ${POSTGRES_USER:-app_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ORCHESTRATOR_GRPC_HOST: orchestrator
      ORCHESTRATOR_GRPC_PORT: 50100
      LOG_LEVEL: INFO
      JAVA_OPTS: "-Xms128m -Xmx384m -XX:+UseG1GC"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    networks:
      - agent-network

  # Orchestrator
  orchestrator:
    image: ghcr.io/jonykchen/agent-platform/orchestrator:latest
    container_name: agent-orchestrator
    ports:
      - "8001:8000"
    environment:
      ENVIRONMENT: production
      APP_PORT: 8000
      DATABASE_URL: postgresql://${POSTGRES_USER:-app_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agent_platform}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      MODEL_GATEWAY_URL: http://model-gateway:8002
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      USE_REDIS_STREAM: "true"
      USE_LOCAL_STORAGE: "true"
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    networks:
      - agent-network

  # Model Gateway
  model-gateway:
    image: ghcr.io/jonykchen/agent-platform/model-gateway:latest
    container_name: agent-model-gateway
    ports:
      - "8002:8002"
    environment:
      ENVIRONMENT: production
      APP_PORT: 8002
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      LLM_DEFAULT_MODEL: ${LLM_DEFAULT_MODEL:-qwen-max}
      LOG_LEVEL: INFO
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
    networks:
      - agent-network

  # Knowledge
  knowledge:
    image: ghcr.io/jonykchen/agent-platform/knowledge:latest
    container_name: agent-knowledge
    ports:
      - "8003:8003"
    environment:
      ENVIRONMENT: production
      APP_PORT: 8003
      DATABASE_URL: postgresql://${POSTGRES_USER:-app_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agent_platform}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
      USE_LOCAL_STORAGE: "true"
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
    networks:
      - agent-network

  # Tool Bus
  tool-bus:
    image: ghcr.io/jonykchen/agent-platform/tool-bus:latest
    container_name: agent-tool-bus
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8083
      DB_HOST: postgres
      DB_USER: ${POSTGRES_USER:-app_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      GRPC_AUTH_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      LOG_LEVEL: INFO
      JAVA_OPTS: "-Xms64m -Xmx256m -XX:+UseG1GC"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 384M
    restart: unless-stopped
    networks:
      - agent-network

  # Governance
  governance:
    image: ghcr.io/jonykchen/agent-platform/governance:latest
    container_name: agent-governance
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8082
      DB_HOST: postgres
      DB_USER: ${POSTGRES_USER:-app_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      GRPC_AUTH_SECRET: ${JWT_SECRET}
      SERVICE_AUTH_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      USE_REDIS_STREAM: "true"
      LOG_LEVEL: INFO
      JAVA_OPTS: "-Xms64m -Xmx256m -XX:+UseG1GC"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 384M
    restart: unless-stopped
    networks:
      - agent-network

  # Web Frontend
  web-frontend:
    image: ghcr.io/jonykchen/agent-platform/web-frontend:latest
    container_name: agent-web-frontend
    ports:
      - "80:80"
    depends_on:
      gateway:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M
    restart: unless-stopped
    networks:
      - agent-network

volumes:
  postgres_data:
  redis_data:

networks:
  agent-network:
    driver: bridge
