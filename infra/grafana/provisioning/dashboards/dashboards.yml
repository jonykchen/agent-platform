# ============================================================
#  Grafana Dashboard Provisioning
# ============================================================

apiVersion: 1

providers:
  - name: 'Agent Platform'
    orgId: 1
    folder: 'Agent Platform'
    folderUid: 'agent-platform'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json