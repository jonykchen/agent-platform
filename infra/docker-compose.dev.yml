# ============================================================
#  Agent Platform - 精简开发环境
#  用法: docker compose -f infra/docker-compose.dev.yml up -d
#
#  仅启动全流程测试必需的基础组件，内存占用 ~1.5 GB。
#  完整可观测栈（Prometheus/Grafana/Jaeger/Loki）请用 docker-compose.yml。
# ============================================================

services:
  # ====== PostgreSQL 16 + pgvector ======
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agent-postgres
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: agent_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../shared/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d agent_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1'
        reservations:
          memory: 256M
          cpus: '0.25'
    networks:
      - agent-network

  # ====== Redis 7 ======
  redis:
    image: redis:7-alpine
    container_name: agent-redis
    command: redis-server --appendonly yes --requirepass dev_password --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "dev_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: '0.5'
        reservations:
          memory: 64M
          cpus: '0.1'
    networks:
      - agent-network

  # ====== MinIO (本地对象存储) ======
  minio:
    image: minio/minio:latest
    container_name: agent-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
          cpus: '0.1'
    networks:
      - agent-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  agent-network:
    driver: bridge
