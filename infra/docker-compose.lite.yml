# ============================================================
#  Agent Platform - 精简生产环境 Docker Compose
#  最低配置：4核8G 即可运行
#  去掉：Kafka、MinIO、监控全家桶
#  用 Redis Stream 替代 Kafka，本地存储替代 MinIO
# ============================================================

services:
  # ====== 基础设施 ======

  # PostgreSQL 16 + pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agent-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?数据库密码必须设置}
      POSTGRES_DB: ${POSTGRES_DB:-agent_platform}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../shared/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app_user} -d ${POSTGRES_DB:-agent_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
        reservations:
          memory: 128M
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - agent-network

  # Redis 7
  redis:
    image: redis:7-alpine
    container_name: agent-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?Redis密码必须设置} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
          cpus: '0.125'
    restart: unless-stopped
    networks:
      - agent-network

  # ====== 应用服务 ======

  # Gateway (Java API 网关)
  gateway:
    build:
      context: ../services/gateway-java
      dockerfile: Dockerfile
    container_name: agent-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-agent_platform}
      DATABASE_USER: ${POSTGRES_USER:-app_user}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?JWT密钥必须设置}
      JWT_EXPIRATION: 3600
      JWT_REFRESH_EXPIRATION: 604800
      ORCHESTRATOR_GRPC_HOST: orchestrator
      ORCHESTRATOR_GRPC_PORT: 50100
      LOG_LEVEL: INFO
      # JVM 优化（降低内存）
      JAVA_OPTS: "-Xms128m -Xmx384m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.125'
    restart: unless-stopped
    networks:
      - agent-network

  # Orchestrator (Python Agent 编排)
  orchestrator:
    build:
      context: ../services/orchestrator-python
      dockerfile: Dockerfile
    container_name: agent-orchestrator
    ports:
      - "8001:8000"
    environment:
      ENVIRONMENT: production
      APP_PORT: 8000
      DATABASE_URL: postgresql://${POSTGRES_USER:-app_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agent_platform}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      # 用 Redis Stream 替代 Kafka
      USE_REDIS_STREAM: "true"
      REDIS_STREAM_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      MODEL_GATEWAY_URL: http://model-gateway:8002
      TOOL_BUS_GRPC_ADDR: tool-bus:40051
      KNOWLEDGE_URL: http://knowledge:8003
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?加密密钥必须设置}
      LOG_LEVEL: INFO
      # 本地文件存储替代 MinIO
      USE_LOCAL_STORAGE: "true"
      LOCAL_STORAGE_PATH: /app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.125'
    restart: unless-stopped
    networks:
      - agent-network

  # Model Gateway (Python 模型网关)
  model-gateway:
    build:
      context: ../services/model-gateway-python
      dockerfile: Dockerfile
    container_name: agent-model-gateway
    ports:
      - "8002:8002"
    environment:
      ENVIRONMENT: production
      APP_PORT: 8002
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
      LLM_API_KEY: ${LLM_API_KEY:?LLM API密钥必须设置}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      LLM_DEFAULT_MODEL: ${LLM_DEFAULT_MODEL:-qwen-max}
      LOG_LEVEL: INFO
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 64M
          cpus: '0.0625'
    restart: unless-stopped
    networks:
      - agent-network

  # Knowledge (Python 知识库)
  knowledge:
    build:
      context: ../services/knowledge-python
      dockerfile: Dockerfile
    container_name: agent-knowledge
    ports:
      - "8003:8003"
    environment:
      ENVIRONMENT: production
      APP_PORT: 8003
      DATABASE_URL: postgresql://${POSTGRES_USER:-app_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agent_platform}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/3
      # 本地文件存储
      USE_LOCAL_STORAGE: "true"
      LOCAL_STORAGE_PATH: /app/storage
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 64M
          cpus: '0.0625'
    restart: unless-stopped
    networks:
      - agent-network

  # Tool Bus (Java 工具总线)
  tool-bus:
    build:
      context: ../services/tool-bus-java
      dockerfile: Dockerfile
    container_name: agent-tool-bus
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8083
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-agent_platform}
      DATABASE_USER: ${POSTGRES_USER:-app_user}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      LOG_LEVEL: INFO
      JAVA_OPTS: "-Xms64m -Xmx256m -XX:+UseG1GC"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.5'
        reservations:
          memory: 64M
          cpus: '0.125'
    restart: unless-stopped
    networks:
      - agent-network

  # Governance (Java 风控审批)
  governance:
    build:
      context: ../services/governance-java
      dockerfile: Dockerfile
    container_name: agent-governance
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8082
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-agent_platform}
      DATABASE_USER: ${POSTGRES_USER:-app_user}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # 用 Redis Stream 替代 Kafka
      USE_REDIS_STREAM: "true"
      REDIS_STREAM_URL: redis://:${REDIS_PASSWORD}@redis:6379/4
      LOG_LEVEL: INFO
      JAVA_OPTS: "-Xms64m -Xmx256m -XX:+UseG1GC"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.5'
        reservations:
          memory: 64M
          cpus: '0.125'
    restart: unless-stopped
    networks:
      - agent-network

  # Web Frontend
  web-frontend:
    build:
      context: ../services/web-frontend
      dockerfile: Dockerfile
    container_name: agent-web-frontend
    ports:
      - "80:80"
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.125'
        reservations:
          memory: 16M
          cpus: '0.0625'
    restart: unless-stopped
    networks:
      - agent-network

volumes:
  postgres_data:
  redis_data:

networks:
  agent-network:
    driver: bridge
