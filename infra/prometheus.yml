# ============================================================
#  Prometheus 配置
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# 告警规则文件
rule_files:
  - alerts.yml

# Alertmanager 配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # OpenTelemetry Collector
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']

  # Gateway Service (Java)
  - job_name: 'gateway-java'
    static_configs:
      - targets: ['host.docker.internal:8080']
    metrics_path: '/actuator/prometheus'

  # Orchestrator Service (Python)
  - job_name: 'orchestrator-python'
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: '/metrics'

  # Model Gateway Service (Python) - 监听 8002（见 Dockerfile uvicorn --port 8002）
  - job_name: 'model-gateway-python'
    static_configs:
      - targets: ['host.docker.internal:8002']
    metrics_path: '/metrics'

  # Knowledge Service (Python) - 监听 8081（见 Dockerfile uvicorn --port 8081）
  - job_name: 'knowledge-python'
    static_configs:
      - targets: ['host.docker.internal:8081']
    metrics_path: '/metrics'

  # Tool Bus Service (Java) - HTTP 8083，Spring Actuator 暴露指标
  # （50051 是 gRPC 端口，无 HTTP /metrics，不能用于抓取）
  - job_name: 'tool-bus-java'
    static_configs:
      - targets: ['host.docker.internal:8083']
    metrics_path: '/actuator/prometheus'

  # Governance Service (Java) - HTTP 8082，Spring Actuator 暴露指标
  - job_name: 'governance-java'
    static_configs:
      - targets: ['host.docker.internal:8082']
    metrics_path: '/actuator/prometheus'

  # Alertmanager
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
