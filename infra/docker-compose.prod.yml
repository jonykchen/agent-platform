# ============================================================
#  Agent Platform - 生产环境 Docker Compose
#  用法: docker compose -f infra/docker-compose.prod.yml up -d
#
#  ⚠️  生产环境必须通过 .env 文件注入所有密钥！
#  复制 .env.example 为 .env 并填入真实值。
# ============================================================

services:
  # ====== 基础设施层 ======

  # PostgreSQL 16 + pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agent-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?数据库密码必须设置}
      POSTGRES_DB: ${POSTGRES_DB:-agent_platform}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../shared/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app_user} -d ${POSTGRES_DB:-agent_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
        reservations:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped
    networks:
      - agent-network

  # Redis 7
  redis:
    image: redis:7-alpine
    container_name: agent-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?Redis密码必须设置}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
        reservations:
          memory: 128M
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - agent-network

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: agent-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MinIO密码必须设置}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
        reservations:
          memory: 256M
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - agent-network

  # Kafka + Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: agent-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
          cpus: '0.125'
    restart: unless-stopped
    networks:
      - agent-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: agent-kafka
    depends_on:
      - zookeeper
    ports:
      - "127.0.0.1:9092:9092"
      - "127.0.0.1:9094:9094"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2'
        reservations:
          memory: 256M
          cpus: '0.5'
    restart: unless-stopped
    networks:
      - agent-network

  # ====== 应用服务层 ======

  # Gateway (Java API 网关)
  gateway:
    build:
      context: ../services/gateway-java
      dockerfile: Dockerfile
    container_name: agent-gateway
    ports:
      - "8080:8080"
      - "9091:9091"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      GRPC_SERVER_PORT: 9091
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-agent_platform}
      DATABASE_USER: ${POSTGRES_USER:-app_user}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?JWT密钥必须设置}
      JWT_EXPIRATION: 3600
      JWT_REFRESH_EXPIRATION: 604800
      ORCHESTRATOR_GRPC_HOST: orchestrator
      ORCHESTRATOR_GRPC_PORT: 50100
      LOG_LEVEL: INFO
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: when-authorized
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
        reservations:
          memory: 256M
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - agent-network

  # Orchestrator (Python Agent 编排)
  orchestrator:
    build:
      context: ../services/orchestrator-python
      dockerfile: Dockerfile
    container_name: agent-orchestrator
    ports:
      - "8001:8000"
      - "50100:50100"
    environment:
      ENVIRONMENT: production
      APP_PORT: 8000
      GRPC_PORT: 50100
      DATABASE_URL: postgresql://${POSTGRES_USER:-app_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agent_platform}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MODEL_GATEWAY_URL: http://model-gateway:8002
      TOOL_BUS_GRPC_ADDR: tool-bus:40051
      KNOWLEDGE_URL: http://knowledge:8003
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?加密密钥必须设置}
      LOG_LEVEL: INFO
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
        reservations:
          memory: 256M
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - agent-network

  # Model Gateway (Python 模型网关)
  model-gateway:
    build:
      context: ../services/model-gateway-python
      dockerfile: Dockerfile
    container_name: agent-model-gateway
    ports:
      - "8002:8002"
    environment:
      ENVIRONMENT: production
      APP_PORT: 8002
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      LLM_API_KEY: ${LLM_API_KEY:?LLM API密钥必须设置}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      LLM_DEFAULT_MODEL: ${LLM_DEFAULT_MODEL:-qwen-max}
      LOG_LEVEL: INFO
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.125'
    restart: unless-stopped
    networks:
      - agent-network

  # Knowledge (Python 知识库)
  knowledge:
    build:
      context: ../services/knowledge-python
      dockerfile: Dockerfile
    container_name: agent-knowledge
    ports:
      - "8003:8003"
    environment:
      ENVIRONMENT: production
      APP_PORT: 8003
      DATABASE_URL: postgresql://${POSTGRES_USER:-app_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agent_platform}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      LOG_LEVEL: INFO
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.125'
    restart: unless-stopped
    networks:
      - agent-network

  # Tool Bus (Java 工具总线)
  tool-bus:
    build:
      context: ../services/tool-bus-java
      dockerfile: Dockerfile
    container_name: agent-tool-bus
    ports:
      - "8083:8083"
      - "40051:40051"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8083
      GRPC_SERVER_PORT: 40051
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-agent_platform}
      DATABASE_USER: ${POSTGRES_USER:-app_user}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      LOG_LEVEL: INFO
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.125'
    restart: unless-stopped
    networks:
      - agent-network

  # Governance (Java 风控审批)
  governance:
    build:
      context: ../services/governance-java
      dockerfile: Dockerfile
    container_name: agent-governance
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8082
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-agent_platform}
      DATABASE_USER: ${POSTGRES_USER:-app_user}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LOG_LEVEL: INFO
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.125'
    restart: unless-stopped
    networks:
      - agent-network

  # Web Frontend
  web-frontend:
    build:
      context: ../services/web-frontend
      dockerfile: Dockerfile
    container_name: agent-web-frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
        reservations:
          memory: 32M
          cpus: '0.0625'
    restart: unless-stopped
    networks:
      - agent-network

  # ====== 可观测性层 ======

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.90.0
    container_name: agent-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
      - "127.0.0.1:8888:8888"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
          cpus: '0.125'
    restart: unless-stopped
    networks:
      - agent-network

  # Prometheus
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: agent-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
        reservations:
          memory: 128M
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - agent-network

  # Alertmanager
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: agent-alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
        reservations:
          memory: 32M
          cpus: '0.0625'
    restart: unless-stopped
    networks:
      - agent-network

  # Loki (日志聚合)
  loki:
    image: grafana/loki:2.9.4
    container_name: agent-loki
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
          cpus: '0.125'
    restart: unless-stopped
    networks:
      - agent-network

  # Promtail (日志采集)
  promtail:
    image: grafana/promtail:2.9.4
    container_name: agent-promtail
    command: ["-config.file=/etc/promtail/promtail-config.yaml"]
    volumes:
      - ./loki/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - agent-network

  # Jaeger (分布式追踪)
  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: agent-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "127.0.0.1:16686:16686"
      - "127.0.0.1:14250:14250"
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.5'
        reservations:
          memory: 64M
          cpus: '0.125'
    restart: unless-stopped
    networks:
      - agent-network

  # Grafana
  grafana:
    image: grafana/grafana:10.2.0
    container_name: agent-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Grafana密码必须设置}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
      - jaeger
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
          cpus: '0.125'
    restart: unless-stopped
    networks:
      - agent-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  agent-network:
    driver: bridge
