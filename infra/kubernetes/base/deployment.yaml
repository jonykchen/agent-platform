# Tool Bus Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tool-bus
  labels:
    app: tool-bus
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tool-bus
  template:
    metadata:
      labels:
        app: tool-bus
        version: v1
    spec:
      containers:
        - name: tool-bus
          image: agent-platform/tool-bus:latest
          ports:
            - containerPort: 8082
              name: http
            - containerPort: 50051
              name: grpc
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            - name: GRPC_SERVER_PORT
              value: "50051"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
