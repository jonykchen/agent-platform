# ============================================================
#  Secret 模板（占位）- 敏感配置统一管理
#
#  ⚠️ 本文件仅为模板，禁止提交真实密钥（G-SEC-01）。
#  生产环境应通过以下方式之一注入真实值：
#    1. 外部 Secret 管理器（Vault / 云厂商 Secret Manager）+ External Secrets Operator
#    2. CI/CD 部署时用 `kubectl create secret` 或 SOPS 加密
#    3. Sealed Secrets
#
#  本模板用 CHANGE_ME 占位，确保部署清单完整、字段可被引用。
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
  labels:
    app: agent-platform
type: Opaque
stringData:
  # 数据库
  DB_PASSWORD: "CHANGE_ME"
  # Redis
  REDIS_PASSWORD: "CHANGE_ME"
  # JWT 签名密钥（≥256 bits）
  JWT_SECRET: "CHANGE_ME_AT_LEAST_32_CHARS_LONG_SECRET"
  # gRPC 服务间认证密钥（≥32 chars）
  GRPC_AUTH_SECRET: "CHANGE_ME_AT_LEAST_32_CHARS_LONG_SECRET"
  # LLM Provider API Keys（按需配置）
  QWEN_API_KEY: "CHANGE_ME"
  DEEPSEEK_API_KEY: "CHANGE_ME"
  GLM_API_KEY: "CHANGE_ME"
  # Embedding 服务
  EMBEDDING_API_KEY: "CHANGE_ME"
  # 通知 Webhook
  WECOM_WEBHOOK: ""
  DINGTALK_WEBHOOK: ""
