# Kubernetes Service 配置 - Base

# Gateway Service
apiVersion: v1
kind: Service
metadata:
  name: gateway
  labels:
    app: gateway
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: gateway
---
# Orchestrator Service
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  labels:
    app: orchestrator
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  selector:
    app: orchestrator
---
# Model Gateway Service
apiVersion: v1
kind: Service
metadata:
  name: model-gateway
  labels:
    app: model-gateway
spec:
  type: ClusterIP
  ports:
    - port: 8001
      targetPort: 8001
      name: http
  selector:
    app: model-gateway
---
# Tool Bus Service
apiVersion: v1
kind: Service
metadata:
  name: tool-bus
  labels:
    app: tool-bus
spec:
  type: ClusterIP
  ports:
    - port: 8082
      targetPort: 8082
      name: http
    - port: 50051
      targetPort: 50051
      name: grpc
  selector:
    app: tool-bus
---
# Governance Service
apiVersion: v1
kind: Service
metadata:
  name: governance
  labels:
    app: governance
spec:
  type: ClusterIP
  ports:
    - port: 8083
      targetPort: 8083
      name: http
  selector:
    app: governance
---
# Knowledge Service
apiVersion: v1
kind: Service
metadata:
  name: knowledge
  labels:
    app: knowledge
spec:
  type: ClusterIP
  ports:
    - port: 8002
      targetPort: 8002
      name: http
  selector:
    app: knowledge
---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-platform
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
    - host: api.agent-platform.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8080