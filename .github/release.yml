# ============================================================
#  Agent Platform — Release Notes 配置
#  自动生成 GitHub Release Notes
#  文档: https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes
# ============================================================

changelog:
  categories:
    - title: 🚀 新功能
      labels:
        - feat
        - enhancement
        - feature
    - title: 🐛 Bug 修复
      labels:
        - fix
        - bug
        - bugfix
    - title: 🔒 安全
      labels:
        - security
        - vulnerability
    - title: 📦 依赖更新
      labels:
        - dependencies
        - deps
    - title: 📝 文档
      labels:
        - docs
        - documentation
    - title: 🔧 其他变更
      labels:
        - "*"
      exclude:
        labels:
          - feat
          - fix
          - security
          - dependencies
          - docs
