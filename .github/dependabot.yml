# Dependabot 配置 - 自动依赖更新和安全漏洞告警
# 文档: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # Java 服务 - Maven
  - package-ecosystem: "maven"
    directory: "/services/gateway-java"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "java"
    reviewers:
      - "jonychen"

  - package-ecosystem: "maven"
    directory: "/services/tool-bus-java"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "java"

  - package-ecosystem: "maven"
    directory: "/services/governance-java"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "java"

  # Python 服务 - pip (uv)
  - package-ecosystem: "pip"
    directory: "/services/orchestrator-python"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "python"

  - package-ecosystem: "pip"
    directory: "/services/model-gateway-python"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "python"

  - package-ecosystem: "pip"
    directory: "/services/knowledge-python"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "python"

  # 前端 - npm
  - package-ecosystem: "npm"
    directory: "/services/web-frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "javascript"
    ignore:
      # 暂不升级 React 19（破坏性变更较多）
      - dependency-name: "react"
        versions: ["19.x"]
      - dependency-name: "react-dom"
        versions: ["19.x"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"
