server:
  port: 8082

spring:
  application:
    name: governance-java

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/agent_platform
    username: ${DB_USER:app_user}
    password: ${DB_PASSWORD:dev_password}
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.platform: DEBUG

# 审批配置
approval:
  # 默认审批人列表（逗号分隔）。生产环境通过 APPROVAL_DEFAULT_APPROVERS 注入
  default-approvers: ${APPROVAL_DEFAULT_APPROVERS:admin}
  # 审批超时扫描间隔（毫秒），默认 1 分钟
  timeout-scan-interval-ms: ${APPROVAL_TIMEOUT_SCAN_INTERVAL_MS:60000}

# 通知配置
notification:
  wecom-webhook: ${WECOM_WEBHOOK:}
  dingtalk-webhook: ${DINGTALK_WEBHOOK:}

# 邮件配置
mail:
  enabled: ${MAIL_ENABLED:false}
  host: ${MAIL_HOST:smtp.example.com}
  port: ${MAIL_PORT:587}
  username: ${MAIL_USERNAME:}
  password: ${MAIL_PASSWORD:}
  from: ${MAIL_FROM:noreply@agent-platform.com}
  tls-enabled: true
