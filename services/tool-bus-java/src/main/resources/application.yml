server:
  port: 8083

spring:
  application:
    name: tool-bus-java

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/agent_platform
    username: ${DB_USER:app_user}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  # Flyway 数据库迁移（自动创建 tool_definition 表）
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:}

grpc:
  server:
    port: ${GRPC_SERVER_PORT:40051}

  auth:
    # 合法的调用方服务列表
    valid-services: orchestrator,gateway
    # Service Token 签名密钥（生产环境必须通过环境变量注入）
    secret: ${GRPC_AUTH_SECRET:}
    issuer: agent-platform

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    root: INFO
    com.platform: DEBUG

# 外部服务配置
# enabled: false = Mock 实现, true = 真实服务调用
external-services:
  user:
    enabled: false
    base-url: ${USER_SERVICE_URL:http://user-service:8080}
    timeout-ms: 5000
  order:
    enabled: false
    base-url: ${ORDER_SERVICE_URL:http://order-service:8080}
    timeout-ms: 5000
  payment:
    enabled: false
    base-url: ${PAYMENT_GATEWAY_URL:http://payment-gateway:8080}
    timeout-ms: 10000
    merchant-id: ${PAYMENT_MERCHANT_ID:}
    api-key: ${PAYMENT_API_KEY:}
