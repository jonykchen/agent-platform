[pytest]
# pytest 配置文件 - 生产级测试最佳实践
#
# 【测试原则】
# 1. 单元测试：测试单个函数/类，不依赖外部服务
# 2. 集成测试：测试多个组件协作，可依赖 Redis/PostgreSQL
# 3. 覆盖率目标：>= 80%
#
# 【运行方式】
# pytest                      # 运行所有测试
# pytest tests/unit           # 只运行单元测试
# pytest tests/integration    # 只运行集成测试
# pytest --cov=app            # 生成覆盖率报告
# pytest -v --cov=app --cov-report=html  # 详细报告 + HTML

# 基础配置
addopts = --cov=app --cov-report=html --cov-report=term-missing --cov-fail-under=80 -v
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 异步测试支持
asyncio_mode = auto

# 标记定义
markers =
    unit: 单元测试（不依赖外部服务）
    integration: 集成测试（依赖 Redis/PostgreSQL）
    slow: 慢测试（执行时间 > 1s）
    security: 安全相关测试

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 覆盖率配置
[coverage:run]
source = app
omit =
    app/__init__.py
    app/main.py
    app/infrastructure/*
    tests/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod