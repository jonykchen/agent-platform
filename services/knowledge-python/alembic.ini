# Alembic config - Knowledge Service
#
# NOTE: alembic reads this .ini with the OS locale encoding (hardcoded
#       encoding="locale" in util/compat.py), so on a GBK-locale Windows it
#       cannot contain non-ASCII. Keep this file ASCII-only; the Chinese docs
#       live in migrations/env.py and each migration script (read as UTF-8).
#
# DB schema version management. Migrations live in migrations/versions/.
# The database URL is resolved in migrations/env.py from the app config
# (DATABASE_URL); no connection string is hardcoded here (G-SEC-01).

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
