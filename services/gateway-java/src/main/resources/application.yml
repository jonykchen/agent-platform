# ============================================================
#  Gateway Service - Spring Boot 配置
# ============================================================

spring:
  application:
    name: gateway-java

  profiles:
    active: ${ENVIRONMENT:local}

  # Jackson JSON 配置 - snake_case 输出以匹配前端
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSS'Z'

  # 数据源配置
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:agent_platform}
    username: ${DB_USER:app_user}
    password: ${DB_PASSWORD:password}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 20000

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Flyway 数据库迁移配置
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false
    clean-disabled: true

# ====== 服务配置 ======
server:
  port: ${PORT:8080}
  shutdown: graceful

# ====== Actuator 配置 ======
management:
  endpoints:
    web:
      exposure:
        include: health,ready,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

# ====== Gateway 配置 ======
gateway:
  fast-path:
    enabled: true
    max-length: 100

# ====== JWT 认证配置 ======
auth:
  jwt:
    secret: ${JWT_SECRET:your-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm}
    access-token-ttl-seconds: ${ACCESS_TOKEN_TTL:3600}
    refresh-token-ttl-seconds: ${REFRESH_TOKEN_TTL:604800}

# ====== Orchestrator gRPC 配置 ======
orchestrator:
  grpc:
    host: ${ORCHESTRATOR_HOST:localhost}
    port: ${ORCHESTRATOR_GRPC_PORT:50051}
    timeout-ms: 30000

# ====== gRPC 配置 ======
grpc:
  server:
    port: ${GRPC_SERVER_PORT:9091}
  client:
    orchestrator:
      address: static://${orchestrator.grpc.host}:${orchestrator.grpc.port}
      negotiation-type: plaintext

# ====== OpenTelemetry 配置 ======
otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
  traces:
    exporter: otlp
  metrics:
    exporter: otlp

# ====== 日志配置 ======
logging:
  level:
    root: INFO
    com.platform: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

---
# ====== 本地开发环境 ======
spring:
  config:
    activate:
      on-profile: local

logging:
  level:
    com.platform: DEBUG

---
# ====== 生产环境 ======
spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    root: WARN
    com.platform: INFO
