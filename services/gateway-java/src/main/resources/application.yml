# ============================================================
#  Gateway Service - Spring Boot 配置
# ============================================================

spring:
  application:
    name: gateway-java

  profiles:
    active: ${ENVIRONMENT:local}

  # Jackson JSON 配置 - snake_case 输出以匹配前端
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSS'Z'

  # 数据源配置
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:agent_platform}
    username: ${DB_USER:app_user}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 20000

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Flyway 数据库迁移配置
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false
    clean-disabled: true

  # 优雅关闭配置
  lifecycle:
    timeout-per-shutdown-phase: 30s

  # Redis 配置 (分布式限流 + 缓存)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms

  # 缓存配置
  cache:
    type: redis
    redis:
      time-to-live: 300000  # 默认 TTL 5分钟
      cache-null-values: false
      key-prefix: 'gateway:'
      use-key-prefix: true

# ====== 服务配置 ======
server:
  port: ${PORT:8080}
  shutdown: graceful

# ====== Actuator 配置 ======
management:
  endpoints:
    web:
      exposure:
        include: health,ready,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true

# ====== 应用通用配置 ======
app:
  # CORS 白名单（唯一来源，由 SecurityConfig 读取）
  # 生产环境通过环境变量 CORS_ALLOWED_ORIGINS 指定可信域名，禁止通配符
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:5175,http://127.0.0.1:3000}

# ====== Gateway 配置 ======
gateway:
  fast-path:
    enabled: true
    max-length: 10  # 安全阈值：从 100 降为 10，减少攻击面

# ====== Model Gateway 配置 ======
model-gateway:
  url: ${MODEL_GATEWAY_URL:http://localhost:8002}
  connect-timeout: 10
  read-timeout: 60

# ====== Knowledge Service 配置 ======
knowledge:
  url: ${KNOWLEDGE_URL:http://localhost:8003}
  connect-timeout: 10
  read-timeout: 60

# ====== Tool Bus Service 配置 ======
tool-bus:
  url: ${TOOL_BUS_URL:http://localhost:8083}
  connect-timeout: 10
  read-timeout: 30

# ====== JWT 认证配置 ======
auth:
  jwt:
    secret: ${JWT_SECRET:}
    access-token-ttl-seconds: ${ACCESS_TOKEN_TTL:3600}
    refresh-token-ttl-seconds: ${REFRESH_TOKEN_TTL:604800}
  # 开发环境绕过认证（生产环境必须为 false）
  dev-bypass:
    enabled: ${AUTH_DEV_BYPASS:false}

# ====== Orchestrator gRPC 配置 ======
orchestrator:
  grpc:
    host: ${ORCHESTRATOR_HOST:localhost}
    port: ${ORCHESTRATOR_GRPC_PORT:50100}
    timeout-ms: ${ORCHESTRATOR_TIMEOUT_MS:30000}
    keepalive-time-ms: ${ORCHESTRATOR_KEEPALIVE_TIME_MS:30000}
    keepalive-timeout-ms: ${ORCHESTRATOR_KEEPALIVE_TIMEOUT_MS:10000}
    max-inbound-message-size: ${ORCHESTRATOR_MAX_MESSAGE_SIZE:16777216}  # 16MB
    idle-timeout-ms: ${ORCHESTRATOR_IDLE_TIMEOUT_MS:300000}
    enable-retry: ${ORCHESTRATOR_ENABLE_RETRY:true}
    max-retry-attempts: ${ORCHESTRATOR_MAX_RETRY_ATTEMPTS:3}

# ====== gRPC 配置 ======
grpc:
  server:
    port: ${GRPC_SERVER_PORT:9091}
  client:
    orchestrator:
      address: static://${orchestrator.grpc.host}:${orchestrator.grpc.port}
      negotiation-type: plaintext

# ====== Rate Limiting 配置 ======
rate-limit:
  enabled: ${RATE_LIMIT_ENABLED:true}
  # 分布式限流开关：多实例部署必须开启，配额经 Redis 全局共享
  # 关闭时使用本地内存（仅适合单实例）
  distributed:
    enabled: ${RATE_LIMIT_DISTRIBUTED:false}
  user:
    rpm: ${RATE_LIMIT_USER_RPM:60}  # 每用户每分钟请求数限制
  tenant:
    tpm: ${RATE_LIMIT_TENANT_TPM:100000}  # 每租户每分钟 token 数限制

# ====== WebClient 配置 (SSE Streaming) ======
webclient:
  pool:
    max-connections: ${WEBCLIENT_POOL_MAX_CONNECTIONS:500}
    idle-timeout-ms: ${WEBCLIENT_POOL_IDLE_TIMEOUT_MS:20000}
    max-life-time-ms: ${WEBCLIENT_POOL_MAX_LIFE_TIME_MS:60000}
    pending-acquire-timeout-ms: ${WEBCLIENT_POOL_PENDING_ACQUIRE_TIMEOUT_MS:60000}
  connect-timeout-ms: ${WEBCLIENT_CONNECT_TIMEOUT_MS:10000}
  read-timeout-ms: ${WEBCLIENT_READ_TIMEOUT_MS:300000}  # SSE 需要长超时
  write-timeout-ms: ${WEBCLIENT_WRITE_TIMEOUT_MS:30000}

# ====== Resilience4j 熔断器配置 ======
# 保护 Gateway → Orchestrator 的 gRPC 调用：下游持续失败时快速失败，
# 避免线程/连接堆积拖垮 Gateway。指标经 actuator/prometheus 暴露。
resilience4j:
  circuitbreaker:
    configs:
      default:
        # 滑动窗口类型：基于调用次数统计失败率
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        # 至少累计 10 次调用才开始计算失败率（避免冷启动误判）
        minimum-number-of-calls: 10
        # 失败率 ≥ 50% 时打开熔断器
        failure-rate-threshold: 50
        # 慢调用率 ≥ 80% 视为不健康
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 30s
        # 打开后等待 30s 进入半开
        wait-duration-in-open-state: 30s
        # 半开状态允许 5 个探测调用
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
        # 暴露熔断器健康指示器到 actuator/health
        register-health-indicator: true
        # gRPC 业务异常（已转译的 BusinessException）也计入失败统计
        record-exceptions:
          - io.grpc.StatusRuntimeException
          - com.platform.gateway.exception.BusinessException
    instances:
      orchestrator:
        base-config: default
        # 流式调用慢调用阈值更宽松（SSE 可能持续较久）
        slow-call-duration-threshold: 60s

# ====== OpenTelemetry 配置 ======
otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
    batch:
      schedule-delay-ms: ${OTEL_BATCH_DELAY_MS:5000}
      max-queue-size: ${OTEL_MAX_QUEUE_SIZE:2048}
      max-export-batch-size: ${OTEL_MAX_EXPORT_BATCH_SIZE:512}
      export-timeout-ms: ${OTEL_EXPORT_TIMEOUT_MS:30000}
  service:
    name: ${OTEL_SERVICE_NAME:gateway-java}
    version: ${OTEL_SERVICE_VERSION:1.0.0}
  traces:
    sampler: parentbased_traceidratio
    sampler-arg: ${OTEL_SAMPLER_RATIO:1.0}  # 采样率 100%

# ====== 日志配置 ======
logging:
  level:
    root: INFO
    com.platform: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

---
# ====== 本地开发环境 ======
spring:
  config:
    activate:
      on-profile: local

# 开发环境启用认证绕过
auth:
  dev-bypass:
    enabled: true

logging:
  level:
    com.platform: DEBUG

---
# ====== 开发环境 (development) ======
spring:
  config:
    activate:
      on-profile: development

# 开发环境启用认证绕过
auth:
  dev-bypass:
    enabled: true

logging:
  level:
    com.platform: DEBUG

---
# ====== 生产环境 ======
spring:
  config:
    activate:
      on-profile: prod

# 生产环境 CORS 白名单必须通过环境变量显式指定可信域名，
# 未配置时回退到空（拒绝所有跨域），杜绝通配符泄露。
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}

# 生产环境默认启用分布式限流（多副本部署）
rate-limit:
  distributed:
    enabled: ${RATE_LIMIT_DISTRIBUTED:true}

logging:
  level:
    root: WARN
    com.platform: INFO
