# ============================================================
#  Gateway Service - Spring Boot 配置
# ============================================================

spring:
  application:
    name: gateway-java

  profiles:
    active: ${ENVIRONMENT:local}

  # Jackson JSON 配置
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSS'Z'

# ====== 服务配置 ======
server:
  port: ${PORT:8080}
  shutdown: graceful

# ====== Actuator 配置 ======
management:
  endpoints:
    web:
      exposure:
        include: health,ready,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

# ====== Gateway 配置 ======
gateway:
  fast-path:
    enabled: true
    max-length: 100

# ====== Orchestrator gRPC 配置 ======
orchestrator:
  grpc:
    host: ${ORCHESTRATOR_HOST:localhost}
    port: ${ORCHESTRATOR_GRPC_PORT:50051}
    timeout-ms: 30000

# ====== gRPC 配置 ======
grpc:
  client:
    orchestrator:
      address: static://${orchestrator.grpc.host}:${orchestrator.grpc.port}
      negotiation-type: plaintext

# ====== OpenTelemetry 配置 ======
otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
  traces:
    exporter: otlp
  metrics:
    exporter: otlp

# ====== 日志配置 ======
logging:
  level:
    root: INFO
    com.platform: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

---
# ====== 本地开发环境 ======
spring:
  config:
    activate:
      on-profile: local

logging:
  level:
    com.platform: DEBUG

---
# ====== 生产环境 ======
spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    root: WARN
    com.platform: INFO
