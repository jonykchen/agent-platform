# ============================================================
#  Gateway Service - Spring Boot 配置
# ============================================================

spring:
  application:
    name: gateway-java

  profiles:
    active: ${ENVIRONMENT:local}

  # Jackson JSON 配置 - snake_case 输出以匹配前端
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSS'Z'

  # 数据源配置
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:agent_platform}
    username: ${DB_USER:app_user}
    password: ${DB_PASSWORD:dev_password}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 20000

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Flyway 数据库迁移配置
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false
    clean-disabled: true

  # 优雅关闭配置
  lifecycle:
    timeout-per-shutdown-phase: 30s

  # Redis 配置 (分布式限流)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:dev_password}
      timeout: 5000ms

# ====== 服务配置 ======
server:
  port: ${PORT:8080}
  shutdown: graceful

# ====== Actuator 配置 ======
management:
  endpoints:
    web:
      exposure:
        include: health,ready,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

# ====== Gateway 配置 ======
gateway:
  fast-path:
    enabled: true
    max-length: 10  # 安全阈值：从 100 降为 10，减少攻击面

# ====== Model Gateway 配置 ======
model-gateway:
  url: ${MODEL_GATEWAY_URL:http://localhost:8002}
  connect-timeout: 10
  read-timeout: 60

# ====== JWT 认证配置 ======
auth:
  jwt:
    secret: ${JWT_SECRET:your-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm}
    access-token-ttl-seconds: ${ACCESS_TOKEN_TTL:3600}
    refresh-token-ttl-seconds: ${REFRESH_TOKEN_TTL:604800}

# ====== Orchestrator gRPC 配置 ======
orchestrator:
  grpc:
    host: ${ORCHESTRATOR_HOST:localhost}
    port: ${ORCHESTRATOR_GRPC_PORT:50051}
    timeout-ms: ${ORCHESTRATOR_TIMEOUT_MS:30000}
    keepalive-time-ms: ${ORCHESTRATOR_KEEPALIVE_TIME_MS:30000}
    keepalive-timeout-ms: ${ORCHESTRATOR_KEEPALIVE_TIMEOUT_MS:10000}
    max-inbound-message-size: ${ORCHESTRATOR_MAX_MESSAGE_SIZE:16777216}  # 16MB
    idle-timeout-ms: ${ORCHESTRATOR_IDLE_TIMEOUT_MS:300000}
    enable-retry: ${ORCHESTRATOR_ENABLE_RETRY:true}
    max-retry-attempts: ${ORCHESTRATOR_MAX_RETRY_ATTEMPTS:3}

# ====== gRPC 配置 ======
grpc:
  server:
    port: ${GRPC_SERVER_PORT:9091}
  client:
    orchestrator:
      address: static://${orchestrator.grpc.host}:${orchestrator.grpc.port}
      negotiation-type: plaintext

# ====== Rate Limiting 配置 ======
rate-limit:
  enabled: ${RATE_LIMIT_ENABLED:true}
  user:
    rpm: ${RATE_LIMIT_USER_RPM:60}  # 每用户每分钟请求数限制
  tenant:
    tpm: ${RATE_LIMIT_TENANT_TPM:100000}  # 每租户每分钟 token 数限制

# ====== WebClient 配置 (SSE Streaming) ======
webclient:
  pool:
    max-connections: ${WEBCLIENT_POOL_MAX_CONNECTIONS:500}
    idle-timeout-ms: ${WEBCLIENT_POOL_IDLE_TIMEOUT_MS:20000}
    max-life-time-ms: ${WEBCLIENT_POOL_MAX_LIFE_TIME_MS:60000}
    pending-acquire-timeout-ms: ${WEBCLIENT_POOL_PENDING_ACQUIRE_TIMEOUT_MS:60000}
  connect-timeout-ms: ${WEBCLIENT_CONNECT_TIMEOUT_MS:10000}
  read-timeout-ms: ${WEBCLIENT_READ_TIMEOUT_MS:300000}  # SSE 需要长超时
  write-timeout-ms: ${WEBCLIENT_WRITE_TIMEOUT_MS:30000}

# ====== OpenTelemetry 配置 ======
otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
    batch:
      schedule-delay-ms: ${OTEL_BATCH_DELAY_MS:5000}
      max-queue-size: ${OTEL_MAX_QUEUE_SIZE:2048}
      max-export-batch-size: ${OTEL_MAX_EXPORT_BATCH_SIZE:512}
      export-timeout-ms: ${OTEL_EXPORT_TIMEOUT_MS:30000}
  service:
    name: ${OTEL_SERVICE_NAME:gateway-java}
    version: ${OTEL_SERVICE_VERSION:1.0.0}
  traces:
    sampler: parentbased_traceidratio
    sampler-arg: ${OTEL_SAMPLER_RATIO:1.0}  # 采样率 100%

# ====== 日志配置 ======
logging:
  level:
    root: INFO
    com.platform: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

---
# ====== 本地开发环境 ======
spring:
  config:
    activate:
      on-profile: local

logging:
  level:
    com.platform: DEBUG

---
# ====== 生产环境 ======
spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    root: WARN
    com.platform: INFO
